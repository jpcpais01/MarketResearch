<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#06120e">
<meta name="description" content="Emerald — investment research that finds good investments. Multi-factor scoring, DCF valuation, screening and portfolio intelligence.">
<title>Emerald · Investment Research</title>
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" href="icons/icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="icons/icon.svg">
<link rel="stylesheet" href="css/styles.css">
</head>
<body>
<div class="bg-blobs" aria-hidden="true">
  <div class="blob b1"></div><div class="blob b2"></div><div class="blob b3"></div>
</div>

<aside class="sidebar glass" id="sidebar">
  <a class="brand" href="#/dashboard">
    <svg class="brand-gem" viewBox="0 0 48 48" width="34" height="34">
      <defs><linearGradient id="gemg" x1="0" y1="0" x2="1" y2="1">
        <stop offset="0" stop-color="#5eead4"/><stop offset="1" stop-color="#10b981"/>
      </linearGradient></defs>
      <path d="M14 8h20l8 11-18 21L6 19z" fill="url(#gemg)"/>
      <path d="M14 8l10 11L34 8M6 19h36M24 19v21" stroke="#06120e" stroke-width="1.6" fill="none" opacity=".55"/>
    </svg>
    <span class="brand-name">Emerald</span>
  </a>
  <nav class="nav">
    <a href="#/dashboard" data-route="dashboard"><span class="ni">◈</span><span>Dashboard</span></a>
    <a href="#/screener" data-route="screener"><span class="ni">⌖</span><span>Screener</span></a>
    <a href="#/action" data-route="action"><span class="ni">⇅</span><span>Price Action</span></a>
    <a href="#/compare" data-route="compare"><span class="ni">⇄</span><span>Compare</span></a>
    <a href="#/watchlist" data-route="watchlist"><span class="ni">☆</span><span>Watchlist</span></a>
    <a href="#/portfolio" data-route="portfolio"><span class="ni">◔</span><span>Portfolio</span></a>
    <a href="#/academy" data-route="academy"><span class="ni">✦</span><span>Academy</span></a>
  </nav>
  <div class="sidebar-foot">
    <div class="mini-note">For research &amp; education — not financial advice</div>
  </div>
</aside>

<header class="topbar glass">
  <div class="search-wrap" id="searchWrap">
    <span class="search-ic">⌕</span>
    <input id="globalSearch" type="text" placeholder="Search ticker or company…" autocomplete="off" spellcheck="false">
    <div class="search-results glass" id="searchResults"></div>
  </div>
  <div class="topbar-right">
    <div class="market-pill" id="marketPill"></div>
  </div>
  <div id="headerLoadBar"></div>
</header>

<main id="view" class="view"></main>

<nav class="mobilebar glass">
  <a href="#/dashboard" data-route="dashboard"><span>◈</span>Home</a>
  <a href="#/screener" data-route="screener"><span>⌖</span>Screen</a>
  <a href="#/action" data-route="action"><span>⇅</span>Action</a>
  <a href="#/compare" data-route="compare"><span>⇄</span>Compare</a>
  <a href="#/watchlist" data-route="watchlist"><span>☆</span>Watch</a>
  <a href="#/portfolio" data-route="portfolio"><span>◔</span>Portfolio</a>
</nav>

<div class="toast-zone" id="toastZone"></div>

<div id="boot" class="boot">
  <svg viewBox="0 0 48 48" width="56" height="56" class="boot-gem">
    <defs><linearGradient id="bgem" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#5eead4"/><stop offset="1" stop-color="#10b981"/>
    </linearGradient></defs>
    <path d="M14 8h20l8 11-18 21L6 19z" fill="url(#bgem)"/>
  </svg>
  <div class="boot-title">Emerald</div>
  <div class="boot-msg" id="bootMsg">Connecting to data server…</div>
  <div class="boot-track"><div class="boot-bar" id="bootBar"></div></div>
</div>

<script src="js/data.js"></script>
<script src="js/analysis.js"></script>
<script src="js/edge.js"></script>
<script src="js/charts.js"></script>
<script src="js/live.js"></script>
<script src="js/app.js"></script>
<script>
if ('serviceWorker' in navigator && location.protocol.startsWith('http')) {
  window.addEventListener('load', () => navigator.serviceWorker.register('sw.js'));
}
</script>
</body>
</html>
